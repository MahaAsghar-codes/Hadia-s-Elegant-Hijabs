<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Hadia's Elegant Hijabs</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div id="header-slot"></div>
    <main class="container section">
      <h1>Admin Dashboard</h1>
      <div class="grid cols-4" id="adminStats"></div>
      <h2>Users</h2>
      <div class="grid cols-3" id="adminUsers"></div>
      <h2>Manage Products</h2>
      <form id="productForm" class="card" style="display:grid; gap:10px; max-width:640px; margin-bottom:12px;">
        <input name="name" placeholder="Product name" required />
        <input name="price" type="number" step="0.01" min="0" placeholder="Price" required />
        <input name="stock" type="number" min="0" placeholder="Stock" required />
        <input name="category" placeholder="Category ID" required />
        <textarea name="description" rows="3" placeholder="Description" required></textarea>
        <button class="btn" type="submit">Add Product</button>
      </form>
      <div class="grid cols-3" id="adminProducts"></div>
      <h2>Orders</h2>
      <div class="grid cols-3" id="adminOrders"></div>
    </main>
    <div id="footer-slot"></div>
    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
