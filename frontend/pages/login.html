<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Hadia's Elegant Hijabs</title>
    <link rel="stylesheet" href="/frontend/css/style.css" />
  </head>
  <body>
    <div id="layout-header"></div>
    <main class="container page-hero grid" style="grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));">
      <form id="loginForm" class="card form-grid">
        <h2>User login</h2>
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button class="btn">Login</button>
      </form>

      <form id="signupForm" class="card form-grid">
        <h2>Create account</h2>
        <input name="name" placeholder="Full name" required />
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button class="btn">Sign up</button>
      </form>

      <form id="adminForm" class="card form-grid">
        <h2>Admin login</h2>
        <input type="email" name="email" placeholder="Admin email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button class="btn">Login as admin</button>
      </form>
    </main>
    <div id="layout-footer"></div>

    <script src="/frontend/components/layout.js"></script>
    <script src="/frontend/js/config.js"></script>
    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/app.js"></script>
    <script src="/frontend/js/auth.js"></script>
  </body>
</html>
