<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart & Checkout | Hadia's Elegant Hijabs</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div id="header-slot"></div>
    <main class="container section" style="display:grid; grid-template-columns:1.1fr .9fr; gap:24px;">
      <section>
        <h1>Your Shopping Cart</h1>
        <div id="cartList"></div>
      </section>
      <aside class="card">
        <h2>Checkout</h2>
        <p>Total: <strong id="cartTotal">$0.00</strong></p>
        <form id="checkoutForm">
          <input name="fullName" placeholder="Full name" required />
          <input name="city" placeholder="City" required />
          <input name="address" placeholder="Address" required />
          <input name="phone" placeholder="Phone" required />
          <button class="btn" type="submit" style="margin-top:10px;">Place Order</button>
        </form>
      </aside>
    </main>
    <div id="footer-slot"></div>
    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
